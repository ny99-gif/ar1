<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Debug v2</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/aframe-chromakey-material/dist/aframe-chromakey-material.min.js"></script>
    
    <style>
      /* デバッグログを絶対に見えるように設定 */
      #debug-log {
        position: fixed; top: 0; left: 0; width: 100%; height: 60px;
        z-index: 9999; background: rgba(255, 0, 0, 0.8); color: white;
        font-family: sans-serif; font-size: 14px; padding: 10px;
        pointer-events: none;
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <div id="debug-log">Status: Initializing...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; autoStart: true;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="artifact" src="./artifact.glb"></a-asset-item>
        <video id="telopVid" src="./telop.mp4" autoplay loop muted playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-entity rotation="90 180 0">
          
          <a-entity gltf-model="#artifact" position="0 0 0" scale="0.2 0.2 0.2"></a-entity>

          <a-video id="telopDisplay" src="#telopVid" 
                   material="shader: chromakey; color: 0 1 0" 
                   position="0 0 0.05" scale="2.5 1.4 1">
          </a-video>

        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      const log = document.getElementById('debug-log');
      const video = document.getElementById('telopVid');

      // 1. まずスクリプトが動いているか
      log.innerHTML = "Script Running. Waiting for video...";

      // 2. 動画が読み込めたか
      video.addEventListener('canplaythrough', () => {
        log.innerHTML = "✅ Video Ready: telop.mp4";
        log.style.background = "rgba(0, 128, 0, 0.8)";
      });

      // 3. エラーが出たか
      video.addEventListener('error', () => {
        log.innerHTML = "❌ Error: Cannot find 'telop.mp4'. Check filename!";
      });
    </script>
  </body>
</html>
