<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/aframe-chromakey-material/dist/aframe-chromakey-material.min.js"></script>
  </head>
  <body>
  <div id="overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.5); color: white; font-family: sans-serif; cursor: pointer;">
    画面をタップしてARを開始
  </div>

  <a-scene mindar-image="imageTargetSrc: ./targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    <a-assets>
      <video id="vid" src="./ar_video.mp4" loop="true" muted crossorigin="anonymous" playsinline></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-video src="#vid" material="shader: chromakey; color: 0 1 0" rotation="0 0 0" position="0 0 0" scale="1 1 1"></a-video>
    </a-entity>
  </a-scene>

  <script>
    // 画面タップでオーバーレイを消し、動画を再生する処理
    const overlay = document.querySelector('#overlay');
    const video = document.querySelector('#vid');
    overlay.addEventListener('click', () => {
      video.play();
      overlay.style.display = 'none'; // メッセージを消す
    });
  </script>
</body>
</html>
