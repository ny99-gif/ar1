<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hybrid AR Final</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/aframe-chromakey-material/dist/aframe-chromakey-material.min.js"></script>
    
    <style>
      #start-button {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 10000; padding: 20px 40px; background: #FFD700; border: none;
        border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px;
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <button id="start-button">タップしてARを開始</button>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; autoStart: false;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="artifact" src="./artifact.glb"></a-asset-item>
        <video id="telopVid" src="./telop.mp4" loop muted playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-entity rotation="90 180 0">
          
          <a-entity gltf-model="#artifact" position="0 0 0" scale="0.2 0.2 0.2"></a-entity>

          <a-video id="telopDisplay" src="#telopVid" 
                   material="shader: chromakey; color: 0 1 0" 
                   position="0 0 0.05" scale="2.5 1.4 1">
          </a-video>

        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      const btn = document.getElementById('start-button');
      const video = document.getElementById('telopVid');
      const scene = document.querySelector('a-scene');

      btn.addEventListener('click', () => {
        scene.systems['mindar-image-system'].start();
        video.play().then(() => {
          btn.style.display = 'none';
        });
      });
    </script>
  </body>
</html>
