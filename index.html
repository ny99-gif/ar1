<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vertical AR Exhibition</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/aframe-chromakey-material/dist/aframe-chromakey-material.min.js"></script>
    
    <style>
      #ui-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 10000; display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        background: rgba(0,0,0,0.8); color: white; font-family: sans-serif;
      }
      #start-btn {
        padding: 15px 30px; background: #c5a059; border: none; color: white;
        font-size: 18px; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <div id="ui-overlay">
      <p>展示：お歯黒道具</p>
      <button id="start-btn">鑑賞を開始する</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; autoStart: false;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="artifact" src="./artifact.glb"></a-asset-item>
        <video id="telopVid" src="./telop.mp4" loop muted playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-entity id="main-content" rotation="0 0 0">
          
          <a-entity gltf-model="#artifact" position="0 0 0.2" scale="0.2 0.2 0.2"></a-entity>

          <a-video id="telopDisplay" src="#telopVid" 
                   material="shader: chromakey; color: 0 1 0" 
                   position="0 0.4 0.3" scale="1.2 0.7 1">
          </a-video>

        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      const overlay = document.getElementById('ui-overlay');
      const btn = document.getElementById('start-btn');
      const video = document.getElementById('telopVid');
      const scene = document.querySelector('a-scene');

      btn.addEventListener('click', () => {
        scene.systems['mindar-image-system'].start();
        video.play();
        overlay.style.display = 'none';
      });
    </script>
  </body>
</html>
