<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hybrid AR Exhibition</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/aframe-chromakey-material/dist/aframe-chromakey-material.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; autoStart: true;" 
      loading-screen="dotsColor: gold; backgroundColor: black"
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="artifact" src="./artifact.glb"></a-asset-item>
        <video id="telopVid" src="./telop.mp4" autoplay loop muted playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-entity rotation="90 0 0">
          
          <a-entity gltf-model="#artifact" position="0 0 0" scale="0.2 0.2 0.2"></a-entity>

          <a-video src="#telopVid" material="shader: chromakey; color: 0 1 0" 
                   position="0 0 0.01" scale="1 1 1">
          </a-video>

        </a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
